<form>
    <div class="form-group my-3 mx-3">

      <label>Course Name:</label>
      <input  [(ngModel)]="course.courseName" name="name" type="text" class="form-control" id="courseName" placeholder="Name">   

      <label class="mt-3">Description:</label>
      <input  [(ngModel)]="course.courseDescription" name="description" type="text" class="form-control" id="courseName" placeholder="Description">   

      <label class="mt-3">Price:</label>
      <input  [(ngModel)]="course.coursePrice" name="price" type="text" class="form-control" id="courseName" placeholder="Price">   

      <div class="d-flex justify-content-center mt-4">
        <button (click)="createCourse()" type="submit" class="btn btn-primary">Create</button>
      </div>

    </div>
   
    
  </form>
