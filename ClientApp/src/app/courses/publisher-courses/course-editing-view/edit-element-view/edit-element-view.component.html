<form>
    <div class="form-group my-3 mx-3">
      <h2 class="d-flex justify-content-center">Element</h2>

      <label>Name:</label>
      <input  [(ngModel)]="element.name" name="section-name" type="text" class="form-control" id="courseName" placeholder="Name">   

      <label class="mt-3">Order:</label>
      <input  [(ngModel)]="element.order" name="order" type="number" value = "1" class="form-control" id="courseName">   

      <h4 class="mt-3 d-flex justify-content-center">Video Content</h4>

      <label class="mt-2">Video URL:</label>
      <input  [(ngModel)]="videoUrl" value="{{elementContent.videoContent.videoUrl}}" name="video-url" type="text" class="form-control" placeholder="Video URL">
      
      <h4 class="mt-3 d-flex justify-content-center">Article Content</h4>

      <label class="mt-2">Text:</label>
      <textarea  [(ngModel)]="articleText" value="{{elementContent.articleContent.text}}" name="article-text" type="text" class="form-control" placeholder="Text" rows="3">
       
      </textarea>

      <div class="d-flex justify-content-center mt-4">
        <button (click)="addOrEditElement()" type="submit" class="btn btn-primary mx-1" style="width: 90px;">Edit</button>
        <button (click)="close()" class="btn btn-primary mx-1" style="width: 90px;">Cancel</button>
      </div>

    </div>
   
</form>
