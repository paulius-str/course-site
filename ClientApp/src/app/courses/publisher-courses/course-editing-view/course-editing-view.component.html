<div class="container mt-5">
    <div class="d-flex justify-content-center">
        <div style="width: 50%;">

            <h4 contenteditable="true">Name:</h4>
            <input [(ngModel)]="course.name" name="course-name" type="text" class="form-control" value="{{course.name}}">

            <h4 class="mt-3">Description:</h4>
            <textarea [(ngModel)]="course.description" name="description" class="form-control" value="{{course.description}}" rows="3"></textarea>
           
            <h4 class="mt-3">Price:</h4>
            <input [(ngModel)]="course.price" name="price" type="number" class="form-control" value="{{course.price}}">
           
            <h4 class="mt-3">Sections:</h4>

            <div *ngFor="let item of sectionsWithElements">

                <div>
                    <div type="button" class="card mt-3" (click)="collapse.toggle()" [attr.aria-expanded]="!isCollapsed"
                    aria-controls="collapseExample">
                        <div class="mx-2">
                            {{item.section.name}}
                            <button (click)="deleteSection(item.section.id)" class="btn-danger">Delete</button>
                        </div>        
                    </div>
                </div>
                       
                <div #collapse="ngbCollapse" [(ngbCollapse)]="item.closed">
                    <div class="card">
                        <div *ngFor="let element of item.elements" (click)="openEditElementView(element)" type="button" class="card-body">
                        {{element.name}}
                        <!-- <button (click)="deleteElement(element.id)" class="btn-warning">Delete</button> -->
                        </div>

                        <div class="d-flex justify-content-center">
                            <button (click)="openNewElementView(item.section.id)" class="btn-primary mt-1" style="width: 160px;">New Element</button>   
                        </div>      

                    </div>
                </div>

            </div>   

            <button (click)="openNewSectionView()" class="btn-primary mt-4">New Section</button>    
            <button *ngIf="!isPublished" (click)="publishCourse()" class="btn-primary mt-4 mx-3">Publish Course</button>    
            <button *ngIf="isPublished"  (click)="unpublishCourse()" class="btn-primary mt-4 mx-3">Unpublish Course</button>    
            <button (click)="saveCourse()" class="btn-primary mt-4">Save Course</button>        

        </div>  
    </div>
</div>
