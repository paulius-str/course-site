        <ngb-rating class="" [rate]="rating.score" [max]="5" [readonly]="true"></ngb-rating>
      </div>
      <div class="col-md-8">
        <div class="card-body">
            
         
          <p class="card-text">{{rating.review}}</p>
 

        </div>
      </div>
    </div>
</div>
